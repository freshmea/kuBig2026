<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memo File IO</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="memo">
        <header>
            <h1>메모장</h1>

    <script src="app.js"></script>

</html>
