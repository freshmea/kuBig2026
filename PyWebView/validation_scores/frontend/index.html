<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Validation Scores</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="panel">
        <h1>점수 입력</h1>
        <label>이름 <input id="name" type="text" autocomplete="off" /></label>
        <label>점수 <input id="score" type="number" min="0" max="100" /></label>
        <button id="submit" type="button">검증</button>
        <section id="result" class="result"></section>
    </main>
    <script src="app.js"></script>
</body>
</html>
